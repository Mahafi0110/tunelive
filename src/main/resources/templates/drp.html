<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        /* ─── PROFILE DROPDOWN ─── */
.profile-dropdown {
    position: relative;
}

.profile-trigger {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 6px 10px;
    border-radius: 20px;
    transition: background 0.2s;
}

.profile-trigger:hover {
    background: rgba(255, 255, 255, 0.08);
}

.profile-avatar {
    width: 32px;
    height: 32px;
    background: #FF0067;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    color: white;
}

.profile-name {
    font-size: 14px;
    color: #fff;
    white-space: nowrap;
}

.profile-arrow {
    font-size: 11px;
    color: #aaa;
    transition: transform 0.3s;
}

/* Rotate arrow when open */
.profile-dropdown.open .profile-arrow {
    transform: rotate(180deg);
}

/* ─── DROPDOWN MENU ─── */
.dropdown-menu {
    display: none;
    position: absolute;
    top: calc(100% + 12px);
    right: 0;
    background: #1a1a1a;
    border: 1px solid #2a2a2a;
    border-radius: 14px;
    min-width: 220px;
    padding: 8px 0;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
    z-index: 9999;
    animation: dropdownFade 0.2s ease;
}

@keyframes dropdownFade {
    from { opacity: 0; transform: translateY(-8px); }
    to   { opacity: 1; transform: translateY(0); }
}

/* Show when open */
.profile-dropdown.open .dropdown-menu {
    display: block;
}

/* ─── DROPDOWN HEADER ─── */
.dropdown-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
}

.dropdown-avatar {
    width: 40px;
    height: 40px;
    background: #FF0067;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 16px;
    color: white;
    flex-shrink: 0;
}

.dropdown-username {
    font-size: 14px;
    font-weight: 600;
    color: #fff;
}

.dropdown-email {
    font-size: 12px;
    color: #777;
    margin-top: 2px;
}

/* ─── DIVIDER ─── */
.dropdown-divider {
    height: 1px;
    background: #2a2a2a;
    margin: 6px 0;
}

/* ─── DROPDOWN LIST ─── */
.dropdown-list {
    list-style: none;
    padding: 4px 0;
}

.dropdown-list li a {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 16px;
    color: #ccc;
    text-decoration: none;
    font-size: 14px;
    transition: background 0.15s, color 0.15s;
}

.dropdown-list li a:hover {
    background: rgba(255, 255, 255, 0.06);
    color: #fff;
}

.dropdown-list li a i {
    width: 16px;
    color: #777;
    font-size: 13px;
    transition: color 0.15s;
}

.dropdown-list li a:hover i {
    color: #FF0067;
}

/* ─── LOGOUT ─── */
.logout-item a {
    color: #ff4d4d !important;
}

.logout-item a i {
    color: #ff4d4d !important;
}

.logout-item a:hover {
    background: rgba(255, 77, 77, 0.08) !important;
}
    </style>
</head>
<body>
    <div class="nav-right">
    <span>Music Language <i class="fa-solid fa-chevron-down"></i></span>

    <!-- Show Login/Signup when NOT logged in -->
    <a th:href="@{/login}" th:if="${session.user == null}">
        Login <i class="fa-solid fa-chevron-down"></i>
    </a>
    <span th:if="${session.user == null}">
        Sign Up <i class="fa-solid fa-chevron-down"></i>
    </span>

    <!-- Show Profile Dropdown when logged in -->
    <div class="profile-dropdown" th:if="${session.user != null}">
        <div class="profile-trigger">
            <div class="profile-avatar">
                <i class="fa-solid fa-user"></i>
            </div>
            <span class="profile-name" th:text="${session.user.name}">My Profile</span>
            <i class="fa-solid fa-chevron-down profile-arrow"></i>
        </div>

        <div class="dropdown-menu">
            <!-- User info header -->
            <div class="dropdown-header">
                <div class="dropdown-avatar">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div>
                    <p class="dropdown-username" th:text="${session.user.name}">Username</p>
                    <p class="dropdown-email" th:text="${session.user.email}">email@example.com</p>
                </div>
            </div>

            <div class="dropdown-divider"></div>

            <!-- Menu Items -->
            <ul class="dropdown-list">
                <li>
                    <a th:href="@{/music}">
                        <i class="fa-solid fa-music"></i> My Music
                    </a>
                </li>
                <li>
                    <a th:href="@{/profile}">
                        <i class="fa-solid fa-user"></i> My Profile
                    </a>
                </li>
                <li>
                    <a th:href="@{/history}">
                        <i class="fa-solid fa-clock-rotate-left"></i> History
                    </a>
                </li>
                <li>
                    <a th:href="@{/account-settings}">
                        <i class="fa-solid fa-gear"></i> Account Settings
                    </a>
                </li>
                <li>
                    <a th:href="@{/help}">
                        <i class="fa-solid fa-circle-question"></i> Help & Support
                    </a>
                </li>
            </ul>

            <div class="dropdown-divider"></div>

            <!-- Logout -->
            <ul class="dropdown-list">
                <li class="logout-item">
                    <a th:href="@{/logout}">
                        <i class="fa-solid fa-right-from-bracket"></i> Logout
                    </a>
                </li>
            </ul>
        </div>
    </div>
</div>
    <script>
        // Profile dropdown toggle
const profileDropdown = document.querySelector('.profile-dropdown');

if (profileDropdown) {
    profileDropdown.querySelector('.profile-trigger').addEventListener('click', (e) => {
        e.stopPropagation();
        profileDropdown.classList.toggle('open');
    });

    // Close when clicking outside
    document.addEventListener('click', () => {
        profileDropdown.classList.remove('open');
    });
}
    </script>
</body>
</html>
