<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liked Songs</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Itim&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" th:href="@{/css/new.css}">
    <style>
        .liked-header {
            display: flex;
            align-items: center;
            gap: 20px;
            background: linear-gradient(135deg, #FF0067, #000);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .liked-header i {
            font-size: 60px;
            color: #FF0067;
            background: white;
            padding: 20px;
            border-radius: 12px;
        }

        .liked-header h1 {
            font-size: 28px;
        }

        .liked-header p {
            color: #aaa;
            font-size: 14px;
            margin-top: 5px;
        }

        .liked-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 25px;
            align-items: center;
        }

        .play-all-btn {
            background: #FF0067;
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 30px;
            font-size: 15px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .play-all-btn:hover {
            opacity: 0.9;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #aaa;
        }

        .empty-state i {
            font-size: 60px;
            color: #FF0067;
            margin-bottom: 20px;
            display: block;
        }

        .empty-state h3 {
            font-size: 20px;
            color: #fff;
            margin-bottom: 10px;
        }

        .empty-state p {
            font-size: 14px;
        }

        .liked-song-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid #222;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .liked-song-row:hover {
            background: rgba(255, 0, 103, 0.15);
        }

        .liked-song-info {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }

        .liked-song-info img {
            width: 45px;
            height: 45px;
            border-radius: 8px;
            object-fit: cover;
        }

        .liked-song-info .song-details h4 {
            font-size: 14px;
            font-weight: 500;
        }

        .liked-song-info .song-details p {
            font-size: 12px;
            color: #aaa;
        }

        .liked-song-actions {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .liked-song-actions span {
            font-size: 12px;
            color: #aaa;
        }

        .liked-song-actions i {
            color: #FF0067;
            cursor: pointer;
            font-size: 16px;
        }

        .liked-song-actions i:hover {
            transform: scale(1.2);
        }

        .song-count {
            color: #aaa;
            font-size: 13px;
            margin-bottom: 15px;
        }
    </style>
</head>

<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>

    <div class="main">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>

        <section class="content">

            <!-- HEADER -->
            <div class="liked-header">
                <i class="fa-solid fa-heart"></i>
                <div>
                    <h1>Liked Songs</h1>
                    <p id="liked-count">0 songs</p>
                </div>
            </div>

            <!-- ACTIONS -->
            <div class="liked-actions" id="liked-actions" style="display:none;">
                <button class="play-all-btn" onclick="playAllLiked()">
                    <i class="fa-solid fa-play"></i> Play All
                </button>
                <span style="color:#aaa; font-size:13px;">Your favourite songs in one place</span>
            </div>

            <!-- SONGS LIST -->
            <div id="liked-songs-list">
                <!-- Empty state shown by default -->
                <div class="empty-state" id="empty-state">
                    <i class="fa-regular fa-heart"></i>
                    <h3>No Liked Songs Yet</h3>
                    <p>Click the ❤️ heart icon on any song to add it here!</p>
                </div>
            </div>

        </section>
    </div>

    <footer class="player">
        <div class="player-left">
            <img id="player-img" src="/images/song0.png"
                style="width:45px;height:45px;border-radius:8px;object-fit:cover;">
            <div style="margin-left:10px">
                <p id="player-title" style="font-size:13px;font-weight:500">Select a song</p>
                <p id="player-artist" style="font-size:11px;color:#aaa">--</p>
            </div>
        </div>
        <div class="player-center">
            <div class="controls">
                <i class="fa-solid fa-backward" id="prevBtn"></i>
                <i class="fa-solid fa-play" id="playBtn"></i>
                <i class="fa-solid fa-forward" id="nextBtn"></i>
            </div>
            <div class="progress-bar">
                <span id="current">0:00</span>
                <input type="range" id="progress" value="0" min="0" max="100" style="flex:1;accent-color:#FF0067;">
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-volume-high"></i>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1"
                style="width:80px;accent-color:#FF0067;">
        </div>
        <audio id="audio"></audio>
    </footer>

    <script th:src="@{/js/main.js}"></script>
    <script>
        // ===================== LIKED SONGS PAGE =====================
        function loadLikedSongs() {
            const liked = JSON.parse(localStorage.getItem('likedSongs') || '[]');
            const list = document.getElementById('liked-songs-list');
            const emptyState = document.getElementById('empty-state');
            const actions = document.getElementById('liked-actions');
            const countEl = document.getElementById('liked-count');
            // ✅ Guard check
            if (!list || !countEl) return;

            countEl.textContent = liked.length + ' songs';

            if (liked.length === 0) {
                list.innerHTML = '';
                emptyState.style.display = 'block';
                actions.style.display = 'none';
                return;
            }

            if (emptyState) emptyState.style.display = 'none';
            if (actions) actions.style.display = 'flex';


            // Clear and rebuild list
            list.innerHTML = '';

            liked.forEach((song, index) => {
                const row = document.createElement('div');
                row.className = 'liked-song-row';
                row.innerHTML = `
                    <div class="liked-song-info">
                        <img src="${song.img}" alt="${song.title}">
                        <div class="song-details">
                            <h4>${song.title}</h4>
                            <p>${song.artist}</p>
                        </div>
                    </div>
                    <div class="liked-song-actions">
                        <span>${song.duration || '5:00'}</span>
                        <i class="fa-solid fa-heart" title="Unlike" onclick="unlikeSong(${index})"></i>
                        <i class="fa-solid fa-play" title="Play" onclick="playSong('${song.src}', '${song.title}', '${song.artist}', '${song.img}')"></i>
                        <i class="fa-solid fa-trash" title="Delete" onclick="unlikeSong(${index})" style="color:#ff4d4d; cursor:pointer;"></i>
                        </div>
                `;
                list.appendChild(row);
            });
        }

        // Unlike a song and remove from list
        function unlikeSong(index) {
            let liked = JSON.parse(localStorage.getItem('likedSongs') || '[]');
            liked.splice(index, 1);
            localStorage.setItem('likedSongs', JSON.stringify(liked));

            // ✅ Small delay before reload to avoid null reference
            setTimeout(() => {
                loadLikedSongs();
            }, 50);
        }

        // Play all liked songs
        function playAllLiked() {
            const liked = JSON.parse(localStorage.getItem('likedSongs') || '[]');
            if (liked.length > 0) {
                playSong(liked[0].src, liked[0].title, liked[0].artist, liked[0].img);
            }
        }

        // Load on page start
        loadLikedSongs();
    </script>
</body>

</html>
