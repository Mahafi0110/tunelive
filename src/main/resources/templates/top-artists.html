<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Top Artists - Tune Hive</title>
    <link rel="stylesheet" th:href="@{/css/new.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .artist-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-top: 20px;
        }
        .artist-card {
            width: 140px;
            text-align: center;
            cursor: pointer;
        }
        .artist-card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #FF0067;
            transition: transform 0.2s;
        }
        .artist-card:hover img { transform: scale(1.05); }
        .artist-card p {
            margin-top: 10px;
            font-size: 14px;
            font-weight: 500;
        }
        .artist-card span {
            font-size: 12px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="main">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <section class="content">
            <h2 style="margin-bottom:20px;">🎤 Top Artists</h2>

            <div class="artist-grid">
                <div class="artist-card" onclick="playSong('/songs/song1.mp3','Arijit Singh','Arijit Singh','/images/song1.jpg')">
                    <img th:src="@{/images/song1.jpg}" alt="artist">
                    <p>Arijit Singh</p>
                    <span>12.5M fans</span>
                </div>
                <div class="artist-card" onclick="playSong('/songs/song2.mp3','Neha Kakkar','Neha Kakkar','/images/song2.jpg')">
                    <img th:src="@{/images/song2.jpg}" alt="artist">
                    <p>Neha Kakkar</p>
                    <span>9.2M fans</span>
                </div>
                <div class="artist-card" onclick="playSong('/songs/song3.mp3','Badshah','Badshah','/images/song3.jpg')">
                    <img th:src="@{/images/song3.jpg}" alt="artist">
                    <p>Badshah</p>
                    <span>8.7M fans</span>
                </div>
                <div class="artist-card" onclick="playSong('/songs/song1.mp3','Shreya Ghoshal','Shreya Ghoshal','/images/song4.jpg')">
                    <img th:src="@{/images/song4.jpg}" alt="artist">
                    <p>Shreya Ghoshal</p>
                    <span>7.9M fans</span>
                </div>
                <div class="artist-card" onclick="playSong('/songs/song2.mp3','Armaan Malik','Armaan Malik','/images/song5.jpg')">
                    <img th:src="@{/images/song5.jpg}" alt="artist">
                    <p>Armaan Malik</p>
                    <span>6.5M fans</span>
                </div>
                <div class="artist-card" onclick="playSong('/songs/song3.mp3','Jubin Nautiyal','Jubin Nautiyal','/images/song6.jpg')">
                    <img th:src="@{/images/song6.jpg}" alt="artist">
                    <p>Jubin Nautiyal</p>
                    <span>5.8M fans</span>
                </div>
                <div class="artist-card" onclick="playSong('/songs/song1.mp3','Tanishk Bagchi','Tanishk Bagchi','/images/song7.jpg')">
                    <img th:src="@{/images/song7.jpg}" alt="artist">
                    <p>Tanishk Bagchi</p>
                    <span>4.9M fans</span>
                </div>
                <div class="artist-card" onclick="playSong('/songs/song2.mp3','Ed Sheeran','Ed Sheeran','/images/song8.jpg')">
                    <img th:src="@{/images/song8.jpg}" alt="artist">
                    <p>Ed Sheeran</p>
                    <span>15.2M fans</span>
                </div>
            </div>

            <footer class="footer" style="margin-top:40px;">
                <div class="footer-bottom">
                    <p>© 2025 Tune Hive Media Limited All rights Reserved</p>
                    <div class="social-icons">
                        <i class="fa-brands fa-youtube"></i>
                        <i class="fa-brands fa-instagram"></i>
                        <i class="fa-brands fa-linkedin"></i>
                        <i class="fa-brands fa-facebook"></i>
                    </div>
                </div>
            </footer>
        </section>
    </div>
    <footer class="player">
        <div class="player-left">
            <img id="player-img" src="/images/song0.png" style="width:45px;height:45px;border-radius:8px;object-fit:cover;">
            <div style="margin-left:10px">
                <p id="player-title" style="font-size:13px;font-weight:500">Select a song</p>
                <p id="player-artist" style="font-size:11px;color:#aaa">--</p>
            </div>
        </div>
        <div class="player-center">
            <div class="controls">
                <i class="fa-solid fa-backward" id="prevBtn"></i>
                <i class="fa-solid fa-play" id="playBtn"></i>
                <i class="fa-solid fa-forward" id="nextBtn"></i>
            </div>
            <div class="progress-bar">
                <span id="current">0:00</span>
                <input type="range" id="progress" value="0" min="0" max="100" style="flex:1;accent-color:#FF0067;">
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-volume-high"></i>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1" style="width:80px;accent-color:#FF0067;">
        </div>
        <audio id="audio"></audio>
    </footer>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
