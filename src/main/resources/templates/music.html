<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music - Tune Hive</title>
    <link rel="stylesheet" th:href="@{/css/new.css}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Itim&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .page-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        .page-header h2 { font-size: 26px; }
        .back-btn {
            background: rgba(255,255,255,0.1);
            border: none;
            color: #fff;
            padding: 8px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: background 0.2s;
        }
        .back-btn:hover { background: #FF0067; }
        .section-title {
            font-size: 18px;
            margin: 25px 0 15px;
            color: #fff;
            border-left: 3px solid #FF0067;
            padding-left: 10px;
        }
        @media (max-width: 576px) {
            .page-header h2 { font-size: 20px; }
            .section-title { font-size: 15px; }
        }
    </style>
</head>
<body>
    <div th:replace="~{fragments/navbar :: navbar}"></div>
    <div class="main">
        <div th:replace="~{fragments/sidebar :: sidebar}"></div>
        <section class="content">

            <div class="page-header">
                <button class="back-btn" onclick="history.back()">
                    <i class="fa-solid fa-arrow-left"></i> Back
                </button>
                <h2>🎵 Music</h2>
            </div>

            <h3 class="section-title">Trending Now</h3>
            <div class="album-grid">
                <div class="card" onclick="playSong('/songs/song1.mp3','Majili','Various Artists','/images/song0.png')">
                    <img th:src="@{/images/song1.jpg}" alt="song">
                    <p>Majili</p><span>Telugu</span>
                </div>
                <div class="card" onclick="playSong('/songs/song2.mp3','Barbad','Various Artists','/images/song1.jpg')">
                    <img th:src="@{/images/song2.jpg}" alt="song">
                    <p>Barbad</p><span>Hindi</span>
                </div>
                <div class="card" onclick="playSong('/songs/song3.mp3','Tum Ho Tum','Various Artists','/images/song2.jpg')">
                    <img th:src="@{/images/song3.jpg}" alt="song">
                    <p>Tum Ho Tum</p><span>Hindi</span>
                </div>
                <div class="card" onclick="playSong('/songs/song1.mp3','Dhun','Various Artists','/images/song3.jpg')">
                    <img th:src="@{/images/song4.jpg}" alt="song">
                    <p>Dhun</p><span>Hindi</span>
                </div>
                <div class="card" onclick="playSong('/songs/song2.mp3','Latest Hindi','Various Artists','/images/song4.jpg')">
                    <img th:src="@{/images/song5.jpg}" alt="song">
                    <p>Latest Hindi</p><span>Hindi</span>
                </div>
                <div class="card" onclick="playSong('/songs/song1.mp3','Tamil Hits','Various Artists','/images/song5.jpg')">
                    <img th:src="@{/images/song6.jpg}" alt="song">
                    <p>Tamil Hits</p><span>Tamil</span>
                </div>
            </div>

            <h3 class="section-title">New Releases</h3>
            <div class="album-grid">
                <div class="card" onclick="playSong('/songs/song1.mp3','New Song 1','Various Artists','/images/song7.jpg')">
                    <img th:src="@{/images/song7.jpg}" alt="song">
                    <p>New Song 1</p><span>Hindi</span>
                </div>
                <div class="card" onclick="playSong('/songs/song2.mp3','New Song 2','Various Artists','/images/song8.jpg')">
                    <img th:src="@{/images/song8.jpg}" alt="song">
                    <p>New Song 2</p><span>Tamil</span>
                </div>
                <div class="card" onclick="playSong('/songs/song3.mp3','New Song 3','Various Artists','/images/song9.jpg')">
                    <img th:src="@{/images/song9.jpg}" alt="song">
                    <p>New Song 3</p><span>Telugu</span>
                </div>
                <div class="card" onclick="playSong('/songs/song1.mp3','New Song 4','Various Artists','/images/song10.jpg')">
                    <img th:src="@{/images/song10.jpg}" alt="song">
                    <p>New Song 4</p><span>Hindi</span>
                </div>
            </div>

            <footer class="footer" style="margin-top:40px;">
                <div class="footer-bottom">
                    <p>© 2025 Tune Hive Media Limited All rights Reserved</p>
                    <div class="social-icons">
                        <i class="fa-brands fa-youtube"></i>
                        <i class="fa-brands fa-instagram"></i>
                        <i class="fa-brands fa-linkedin"></i>
                        <i class="fa-brands fa-facebook"></i>
                    </div>
                </div>
            </footer>
        </section>
    </div>

    <footer class="player">
        <div class="player-left">
            <img id="player-img" src="/images/song0.png" style="width:45px;height:45px;border-radius:8px;object-fit:cover;">
            <div style="margin-left:10px">
                <p id="player-title" style="font-size:13px;font-weight:500">Select a song</p>
                <p id="player-artist" style="font-size:11px;color:#aaa">--</p>
            </div>
        </div>
        <div class="player-center">
            <div class="controls">
                <i class="fa-solid fa-backward" id="prevBtn"></i>
                <i class="fa-solid fa-play" id="playBtn"></i>
                <i class="fa-solid fa-forward" id="nextBtn"></i>
            </div>
            <div class="progress-bar">
                <span id="current">0:00</span>
                <input type="range" id="progress" value="0" min="0" max="100" style="flex:1;accent-color:#FF0067;">
                <span id="duration">0:00</span>
            </div>
        </div>
        <div class="player-right">
            <i class="fa-regular fa-heart"></i>
            <i class="fa-solid fa-volume-high"></i>
            <input type="range" id="volume" min="0" max="1" step="0.1" value="1" style="width:80px;accent-color:#FF0067;">
        </div>
        <audio id="audio"></audio>
    </footer>
    <script th:src="@{/js/main.js}"></script>
</body>
</html>
