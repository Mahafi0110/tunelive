<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OTP verification</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>
<style>
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Inter', sans-serif;
    }

    body {
        background: #f5f5f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        display: flex;
        background: white;
        width: 1100px;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    /* LEFT SIDE */

    .login-box {
        flex: 1;
        padding: 60px;
        text-align: left;
    }

    .login-box h1 {
        color: black;
        font-size: 32px;
        margin-bottom: 10px;
    }

    .subtitle {
        color: #777;
        margin-bottom: 30px;
    }

    .login-box input {
        width: 100%;
        padding: 14px;
        border-radius: 30px;
        border: 1px solid #ccc;
        margin-bottom: 20px;
    }

    .continue-btn {
        width: 100%;
        padding: 14px;
        border: none;
        background: #FF0067;
        color: white;
        border-radius: 30px;
        font-size: 16px;
        cursor: pointer;
        margin-bottom: 20px;
    }

    .terms-text {
        color: black;
        font-size: 14px;
    }

    .checkbox {
        display: flex;
        align-items: flex-start;
        /* align checkbox with first text line */
        margin-top: 8px;
        font-size: 14px;
        color: black;
        margin: 0;
    }

    .checkbox input {
        margin-top: 3px;
        /* aligns checkbox with text */
        margin-right: 6px;
        margin: 0;
    }

    .login-link {
        font-size: 14px;
        color: black;
        text-align: center;
    }

    .login-link span {
        color: #FF0067;
        cursor: pointer;
    }


    /* RIGHT SIDE */

    .image-section {
        flex: 1;
        background: #f0f0f0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        position: relative;
    }

    .logo {
        position: absolute;
        top: 20px;
        left: 20px;
        background: white;
        padding: 8px 14px;
        border-radius: 8px;
        color: #FF0067;
        font-weight: 600;
    }

    .image-section img {
        width: 100%;
        max-width: 500px;
        height:500px;
    }


    /* RESPONSIVE */

    @media(max-width:1024px) {

        .container {
            width: 90%;
        }

    }

    @media(max-width:768px) {

        .container {
            flex-direction: column;
        }

        .image-section {
            display: none;
        }

        .login-box {
            padding: 40px;
        }

    }

    @media(max-width:480px) {

        .login-box h1 {
            font-size: 26px;
        }

        .continue-btn {
            font-size: 14px;
        }

        .social-buttons {
            flex-direction: column;
        }

    }
</style>

<body>

    <div class="container">

        <!-- LEFT SECTION -->
        <div class="login-box">

            <h1>Enter your 6-Digit Code</h1>

            <p class="subtitle">
    We’ve sent your code to the phone number 
    <b th:text="${phone}"></b>. 
    Didn’t get it? Resend the code
</p>

            <!-- ✅ FORM -->
            <form th:action="@{/verify-otp}" method="post">

                <input type="text" name="otp" placeholder="Enter OTP" required>

                <button type="submit" class="continue-btn">Verify</button>

            </form>

            <!-- ❌ ERROR MESSAGE -->
            <p th:if="${error}" style="color:red; margin-top:10px;">
                [[${error}]]
            </p>
            <!-- ✅ TEST MODE — Remove before production -->
<p th:if="${testOtp}" style="color: #FF0067; margin-top: 10px; font-size: 14px;">
    🔐 Test OTP: <strong th:text="${testOtp}"></strong>
</p>

            <p class="terms-text">
                Select ‘Log In” to give consent to Tune hive Terms of service and acknowledge that you have read and
                understood the privacy policy.
            </p>
        </div>


        <!-- RIGHT SECTION -->
        <div class="image-section">

            <!-- <div class="logo">🎵 TUNE HIVE</div> -->

            <img th:src="@{/images/login.png}" alt="music">

        </div>

    </div>

</body>

</html>
